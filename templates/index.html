<!DOCTYPE html>
<html>
<head>
<title>TraceGrid OSINT Tool</title>

<style>
body{
    background:#0f0f0f;
    color:white;
    font-family:Arial;
    text-align:center;
    margin-top:120px;
}

h1{
    font-size:40px;
}

input{
    width:350px;
    padding:12px;
    border-radius:6px;
    border:none;
    font-size:16px;
}

button{
    padding:12px 20px;
    margin-left:10px;
    background:#ff3b3b;
    border:none;
    color:white;
    font-size:16px;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#ff0000;
}
</style>

</head>

<body>

<h1>TraceGrid</h1>
<p>OSINT Infrastructure Investigation Tool</p>

<input id="domain" placeholder="Enter domain (example.com)">
<button onclick="analyze()">Analyze</button>

<script>

function analyze(){

let domain = document.getElementById("domain").value;

if(domain === ""){
alert("Enter a domain");
return;
}

window.location.href = "/report?domain=" + domain;

}

</script>

</body>
</html>
